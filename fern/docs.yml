# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: library-docs-local.docs.buildwithfern.com # update this to {yourorg}.docs.buildwithfern.com
    # custom-domain: plantstore.dev # specify your custom domain when you are ready to go live

ai-search:
  location:
    - docs

title: Fern Docs Starter

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

tabs:
  home:
    display-name: Docs
    icon: home
  API Reference:
    display-name: API Reference
    icon: puzzle
  C++ Golden Pages:
    display-name: C++ Golden Pages
    icon: code
  Library Reference:
    display-name: Library Reference
    icon: book
  TTL Reference:
    display-name: TTL Reference
    icon: book
  LangChain Core Reference:
    display-name: LangChain Core
    icon: book
  Django Core Reference:
    display-name: Django Core Reference
    icon: book

libraries:
  nemo-rl:
    input:
      git: https://github.com/NVIDIA-NeMo/RL
    output:
      path: ./library-docs/nemo-rl-docs
    lang: python
  ttl:
    input:
      git: https://github.com/tenstorrent/tt-lang
      subpath: python/ttl
    output:
      path: ./library-docs/ttl-docs
    lang: python
  langchain-core:
    input:
      git: https://github.com/langchain-ai/langchain
      subpath: libs/core/langchain_core
    output:
      path: ./library-docs/langchain-core-docs
    lang: python


navigation:
  - tab: home
    layout:
      - section: Get started
        contents:
          - page: Welcome
            path: docs/pages/welcome.mdx
            icon: fa-duotone fa-house
          - page: Edit your docs
            path: docs/pages/editing-your-docs.mdx
            icon: fa-duotone fa-pen-to-square
          - page: Write content
            path: docs/pages/writing-content.mdx
            icon: fa-duotone fa-file-lines
          - page: Set up navigation
            path: docs/pages/navigation.mdx
            icon: fa-duotone fa-sitemap
          - page: Customize your docs
            path: docs/pages/customization.mdx
            icon: fa-duotone fa-palette
          - page: Steps TOC Test
            path: docs/pages/steps-toc-test.mdx
            icon: fa-duotone fa-list-ol
          - page: Nominal Data Model
            path: docs/pages/nominal-data-model.mdx
            icon: fa-duotone fa-database
          - page: Support
            path: docs/pages/support.mdx
            icon: fa-duotone fa-headset
      - section: Changelog
        contents:
          - changelog: docs/changelog
  - tab: API Reference
    layout:
      - section: Overview
        contents:
          - page: API reference
            path: docs/pages/api-reference-overview.mdx
            icon: fa-duotone fa-book
      - api: Plant Store API
        layout:
          - section: Plants
            referenced-packages:
              - plant
            contents: []
          - section: Users
            referenced-packages:
              - user
            contents: []
  - tab: C++ Golden Pages
    layout:
      - section: CUB
        contents:
          - page: BlockReduce
            path: pages/cub/block_reduce_v3.mdx
          - page: BlockScan
            path: pages/cub/block_scan_v4.mdx
          - page: WarpReduce
            path: pages/cub/warp_reduce_v4.mdx
          - page: ArgMax
            path: pages/cub/simple_struct_v4.mdx
      - section: Thrust
        contents:
          - page: device_vector
            path: pages/thrust/device_vector_v3.mdx
          - page: pointer
            path: pages/thrust/pointer_v4.mdx
          - page: strided_iterator
            path: pages/thrust/deprecated_example_v4.mdx
          - page: disjoint_unsynchronized_pool_resource
            path: pages/thrust/group_member_example_v4.mdx
      - section: libcudacxx
        contents:
          - page: resource_with
            path: pages/libcudacxx/concept_example_v3.mdx
          - page: counting_iterator
            path: pages/libcudacxx/deep_template_class_v4.mdx
          - page: buffer
            path: pages/libcudacxx/empty_docstring_class_v4.mdx
          - page: stream
            path: pages/libcudacxx/raises_example_v4.mdx
  - tab: Library Reference
    layout:
      - library: nemo-rl
  - tab: TTL Reference
    layout:
      - library: ttl
  - tab: LangChain Core Reference
    layout:
      - library: langchain-core
  

navbar-links:
  - type: minimal
    text: Fork this repo
    url: https://github.com/fern-api/docs-starter
  - type: filled
    text: Dashboard
    url: https://dashboard.buildwithfern.com
  - type: github
    value: https://github.com/fern-api/fern
      
colors:
  accent-primary:
    dark: "#70E155"
    light: "#008700"
  background:
    dark: "#111113"
    light: "#FFFFFF"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: docs/assets/logo.svg
  light: docs/assets/logo.svg
  height: 20
  href: https://buildwithfern.com

favicon: docs/assets/favicon.svg
